<ul [ngClass]="theme">
    <li *ngFor="let item of headerItems">
        <ng-container [ngSwitch]="item.type">
            <img *ngSwitchCase="'img'" [src]="item.src" alt="photo">
            <a *ngSwitchCase="'link'" [href]="item.href" target="_blank">{{ item.label }}</a>
            <span *ngSwitchDefault [ngStyle]="item.email ? { color: emailColor } : null">
                {{ item.label }}
            </span>
        </ng-container>
    </li>
</ul>

<button (click)="setTheme('light')">☀️</button>
<button (click)="setTheme('dark')">🌙</button>
<button (click)="toggleEmailColor()">
  Toggle email color
</button>
<ul>
  <li *ngFor="let task of tasks; let i = index">

    <input type="checkbox" [(ngModel)]="task.completed">

    <span [ngClass]="{ done: task.completed }">
      {{ task.title }}
    </span>

    <button (click)="deleteTask(i)">🗑</button>

  </li>
</ul>

<input 
  [(ngModel)]="newTask" 
  placeholder="Например, новая задача"
>

<button (click)="addTask()">Добавить</button>
